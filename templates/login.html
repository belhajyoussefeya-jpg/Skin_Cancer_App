{% extends 'base.html' %}
{% block title %}Connexion · SKIN.AI{% endblock %}

{% block content %}
<div class="login-wrapper">
  <div class="glass-card login-card fade-up">
    <div class="text-center">
      <div class="login-logo float">
        <i class="bi bi-cpu-fill"></i>
      </div>
      <h2 class="gradient-text mb-1" style="font-weight: 800;">SKIN.AI</h2>
      <p class="text-muted-2 mb-4" style="font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; letter-spacing: 1.5px;">
        SKIN CANCER DETECTION SYSTEM
      </p>
    </div>

    <form method="POST" action="{{ url_for('login') }}">
      <div class="mb-3">
        <label for="username" class="form-label">
          <i class="bi bi-person"></i> Nom d'utilisateur
        </label>
        <input type="text" class="form-control" id="username" name="username"
               placeholder="admin" required autofocus autocomplete="username">
      </div>

      <div class="mb-4">
        <label for="password" class="form-label">
          <i class="bi bi-shield-lock"></i> Mot de passe
        </label>
        <input type="password" class="form-control" id="password" name="password"
               placeholder="••••" required autocomplete="current-password">
      </div>

      <button type="submit" class="btn btn-neon w-100 py-2">
        <i class="bi bi-arrow-right-circle"></i> Se connecter
      </button>
    </form>

    <div class="divider-text">SYSTÈME SÉCURISÉ</div>

    <div class="text-center">
      <small class="text-muted-2">
        Compte test : <code>admin</code> / <code>1234</code>
      </small>
    </div>
  </div>
</div>
{% endblock %}
